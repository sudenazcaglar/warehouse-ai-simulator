services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    container_name: warehouse-api-prod
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - warehouse-prod-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile.prod
    container_name: warehouse-dashboard-prod
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - warehouse-prod-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: warehouse-postgres-prod
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warehouse_ai}
      POSTGRES_USER: ${POSTGRES_USER:-warehouse_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warehouse_password}
    expose:
      - "5432"
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    networks:
      - warehouse-prod-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: warehouse-redis-prod
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis-prod-data:/data
    networks:
      - warehouse-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: warehouse-minio-prod
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-prod-data:/data
    networks:
      - warehouse-prod-network
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:9000/minio/health/live"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: warehouse-minio-init-prod
    env_file:
      - .env
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-models}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - warehouse-prod-network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb -p local/$${MINIO_BUCKET} || true;
      mc anonymous set none local/$${MINIO_BUCKET} || true;
      echo 'Production MinIO bucket is ready.';
      "
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    container_name: warehouse-nginx-prod
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    networks:
      - warehouse-prod-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: warehouse-prometheus-prod
    profiles:
      - observability
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    expose:
      - "9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-prod-data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    networks:
      - warehouse-prod-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: warehouse-grafana-prod
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    expose:
      - "3000"
    volumes:
      - grafana-prod-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - warehouse-prod-network
    restart: unless-stopped

networks:
  warehouse-prod-network:
    driver: bridge

volumes:
  postgres-prod-data:
  redis-prod-data:
  minio-prod-data:
  prometheus-prod-data:
  grafana-prod-data:
